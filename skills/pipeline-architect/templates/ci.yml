# Gate ladder + release-on-tag archetype (GitHub Actions).
#
# Drop into a project's .github/workflows/. This is the REFERENCE pipeline for a
# library / CLI / plugin: the `gates` job runs the methodology's gates on every
# push/PR and the `release` job cuts a GitHub Release when a vX.Y.Z tag is
# pushed. For a service, frontend, or data-science project, keep `gates` and
# swap `release` for that archetype's delivery (see pipeline-architect SKILL.md).
#
# Gates are marked [L0]-[L3] — the project's maturity ladder (recorded in the
# project's pipeline.md). L2/L3 steps ship commented out: uncomment each when
# you reach that level. Steps assume Python (pytest/ruff/mypy); swap per
# language — vitest/eslint/prettier/tsc, cargo test/clippy, etc.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]        # release-on-tag: a human pushing the tag triggers release
  pull_request:
    branches: [main]

jobs:
  gates:
    # The automated backstop for the manual gates. Branch protection requires
    # this job (check name: "gates") to be green before merging to main.
    # Least privilege: this job runs project code, so it only reads.
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so the secret scan sees every commit

      # [L0] Secret scan (backstop for secret-safe-commits).
      # gitleaks-action is free for personal/public repos; orgs need a license.
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install
        run: pip install -r requirements.txt
        # No requirements.txt yet? Replace with your project's install step.

      # [L0] Unit tests — the fast red/green suite from TDD, distinct from
      # UAT/SIT. No tests/unit yet? Point this at your fast suite.
      - name: Unit tests
        run: pytest tests/unit -q

      # [L1] Reproducibility: the general conductor must run clean.
      - name: Reproduce (conductor)
        run: python conductor.py
        # Adapt to your conductor's entry point (Makefile, conductor.mjs, …).

      # [L1] The tests that back every step's UAT and the SIT.
      # No tests/sit yet? Drop that path until the SIT exists (pytest errors
      # on missing paths) — and add it back when Phase 4 arrives.
      - name: UAT / SIT
        run: pytest tests/uat tests/sit

      # [L2] Lint + format check (backstop for craftsmanship-bar).
      # Uncomment when you reach L2 (see pipeline.md).
      # - name: Lint + format
      #   run: |
      #     ruff check .
      #     ruff format --check .

      # [L2] Coverage, advisory — reported, never blocks.
      # Uncomment when you reach L2 (see pipeline.md).
      # - name: Coverage (advisory)
      #   continue-on-error: true
      #   run: pytest tests/unit --cov=. --cov-report=term

      # [L3] Type check. Uncomment when you reach L3 (see pipeline.md).
      # - name: Type check
      #   run: mypy .

      # [L3] Coverage floor — REPLACES the L2 advisory step above.
      # Keep the number in sync with pipeline.md; the floor only rises.
      # - name: Coverage (floor)
      #   run: pytest tests/unit --cov=. --cov-report=term --cov-fail-under=60

  release:
    # Release-on-tag archetype. Runs ONLY for vX.Y.Z tags, and only after the
    # gates pass. The human minted the tag; CI just packages and publishes.
    needs: gates
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write    # only the release job may write (create the Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes

      # Publishing to a registry is opt-in — uncomment and add the token for
      # PyPI / npm / crates once you actually distribute the package.
      # - name: Publish to PyPI
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: |
      #     pip install build twine
      #     python -m build
      #     twine upload dist/*
